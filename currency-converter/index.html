<body class="flex flex-col min-h-screen">
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-537NPQRV" height="0" width="0"
            style="display:none;visibility:hidden"></iframe></noscript>

    <!-- Navbar -->
    <div id="site-header" data-basepath="../"></div>

    <main class="w-full max-w-7xl mx-auto flex-grow flex flex-col px-4 py-8 items-center justify-center">
        <div class="text-center mb-8">
            <h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold mb-2" style="color: var(--text-main);">
                Currency Converter <span class="text-indigo-500">Pro</span>
            </h1>
            <p style="color: var(--text-muted);" class="font-medium text-sm sm:text-base mb-1">Real-time global exchange
                rates.</p>
            <p style="color: var(--text-muted);" class="text-xs sm:text-sm font-semibold">Developer: <span
                    style="color: var(--primary-color);">MEHEDI HASAN SHIHAB</span></p>
        </div>

        <div class="shihab_glass_card p-5 sm:p-8 rounded-3xl shadow-2xl w-full max-w-md mx-auto"
            style="background-color: var(--bg-card); border: 1px solid var(--border-color);">
            <div class="space-y-4">
                <!-- Amount Input -->
                <div>
                    <label class="block text-xs font-bold uppercase mb-2"
                        style="color: var(--text-muted);">Amount</label>
                    <input type="number" id="mehedi_amount" value="1"
                        class="sshihabb007_input w-full border-none text-2xl p-4 rounded-2xl outline-none transition-all focus:ring-2 focus:ring-indigo-500 font-semibold"
                        style="background-color: var(--bg-hover); color: var(--text-main);">
                </div>

                <!-- Currency Selection -->
                <div class="grid grid-cols-1 gap-2 mt-4">
                    <div>
                        <label class="block text-xs font-bold uppercase mb-2"
                            style="color: var(--text-muted);">From</label>
                        <select id="shihab_fromCurrency"
                            class="sshihabb007_input w-full p-4 rounded-2xl outline-none appearance-none cursor-pointer font-semibold border-none focus:ring-2 focus:ring-indigo-500"
                            style="background-color: var(--bg-hover); color: var(--text-main);"></select>
                    </div>

                    <!-- Swap Button Row -->
                    <div class="flex justify-center items-center py-1">
                        <button id="mehedi_swapBtn"
                            class="bg-indigo-600 p-2 rounded-full hover:rotate-180 transition-transform duration-300 text-white shadow-lg cursor-pointer flex items-center justify-center w-10 h-10 border-none"
                            title="Swap currencies">
                            <i class="fas fa-exchange-alt"></i>
                        </button>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase mb-2"
                            style="color: var(--text-muted);">To</label>
                        <select id="shihab_toCurrency"
                            class="sshihabb007_input w-full p-4 rounded-2xl outline-none appearance-none cursor-pointer font-semibold border-none focus:ring-2 focus:ring-indigo-500"
                            style="background-color: var(--bg-hover); color: var(--text-main);"></select>
                    </div>
                </div>

                <!-- Result Area -->
                <div class="mt-8 pt-6 text-center" style="border-top: 1px solid var(--border-color);">
                    <p id="sshihabb007_rateText" class="text-sm mb-1 font-semibold" style="color: var(--text-muted);">
                        Getting latest rates...</p>
                    <h2 id="mehedi_resultText" class="text-3xl sm:text-4xl font-black break-words"
                        style="color: var(--text-main);">--.--</h2>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div id="site-footer"></div>

    <script src="../js/load-components.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/shihab-security.js"></script>

    <!-- Local Logic -->
    <script src="script.js"></script>

    <!-- Custom Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('../sw.js').then(reg => {
                    console.log('Service Worker registered!');
                }).catch(err => console.log('Service Worker registration failed', err));
            });
        }
    </script>
