    <script>
      // Make theme init available globally for React to call on mount
      window.mehedi_initTheme = () => {
          const shihab_themeBtn = document.getElementById('sshihabb007-theme-toggle');
          if (!shihab_themeBtn) return;
          
          // clear old listeners if any by cloning
          const newBtn = shihab_themeBtn.cloneNode(true);
          shihab_themeBtn.parentNode.replaceChild(newBtn, shihab_themeBtn);
          
          const mehedi_themeIcon = newBtn.querySelector('i');
          const sshihabb007_currentTheme = localStorage.getItem('mehedi_theme');
          
          if (sshihabb007_currentTheme === 'light') {
              document.body.classList.add('light-mode');
              mehedi_themeIcon.classList.replace('fa-moon', 'fa-sun');
          } else {
              document.body.classList.remove('light-mode');
              mehedi_themeIcon.classList.replace('fa-sun', 'fa-moon');
          }

          newBtn.addEventListener('click', () => {
              document.body.classList.toggle('light-mode');
              
              if (document.body.classList.contains('light-mode')) {
                  localStorage.setItem('mehedi_theme', 'light');
                  mehedi_themeIcon.classList.replace('fa-moon', 'fa-sun');
              } else {
                  localStorage.setItem('mehedi_theme', 'dark');
                  mehedi_themeIcon.classList.replace('fa-sun', 'fa-moon');
              }
          });
      };
      
      // Initial load
      const initThemeLight = localStorage.getItem('mehedi_theme');
      if (initThemeLight === 'light') {
          document.documentElement.classList.add('light-mode'); // Avoid flash
      }
    </script>
